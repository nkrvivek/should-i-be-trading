<!DOCTYPE html>
<html>
<head><style>
body { margin: 0; display: flex; align-items: center; justify-content: center; width: 512px; height: 512px; background: #0a0f14; }
.logo { width: 400px; height: 400px; border: 2px solid #1e293b; border-radius: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; background: #0a0f14; }
.dot { width: 64px; height: 64px; border-radius: 50%; }
.red { background: #E85D6C; opacity: 0.25; }
.yellow { background: #F5A623; opacity: 0.25; }
.green { background: #05AD98; box-shadow: 0 0 40px #05AD98, 0 0 80px rgba(5, 173, 152, 0.4); }
.text { font-family: monospace; font-size: 48px; font-weight: 700; color: #05AD98; letter-spacing: 8px; margin-top: 16px; }
</style></head>
<body>
<div class="logo">
  <div class="dot red"></div>
  <div class="dot yellow"></div>
  <div class="dot green"></div>
  <div class="text">SIBT</div>
</div>
</body>
</html>
