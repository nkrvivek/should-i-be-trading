name: Secret Scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          echo "Scanning for leaked secrets..."
          FOUND=0

          # Check for common secret patterns
          if git diff origin/main...HEAD -- ':!*.lock' ':!node_modules' | grep -qE '(sk-ant-|sk_test_|sk_live_|whsec_|AKIA[A-Z0-9]{16})[A-Za-z0-9_-]{20,}'; then
            echo "ERROR: Possible API keys detected in diff"
            FOUND=1
          fi

          # Check for .env files being committed
          if git diff --name-only origin/main...HEAD | grep -qE '^\.env$|^\.env\.local$|^\.env\.production$'; then
            echo "ERROR: .env file detected in commit"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "Secret scan FAILED. Review your changes."
            exit 1
          fi

          echo "No secrets detected."
